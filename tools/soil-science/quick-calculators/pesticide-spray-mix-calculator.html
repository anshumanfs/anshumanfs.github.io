  <title>Pesticide Spray Mix Calculator - Anshuman Nayak</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Pesticide Spray Mix Calculator",
    "url": "https://anshumann.com/tools/soil-science/quick-calculators/pesticide-spray-mix-calculator.html",
    "description": "Estimate spray solution and product quantity by area, spray volume, and dose.",
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "Web",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    }
  }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-sky-50 to-cyan-100 min-h-screen">
  <main class="max-w-5xl mx-auto px-4 py-8 md:py-12">
    <div class="bg-white rounded-3xl shadow-xl border border-sky-100 p-6 md:p-10">
      <div class="flex items-center justify-between flex-wrap gap-3 mb-6">
        <h1 class="text-2xl md:text-4xl font-bold text-cyan-800">Pesticide Spray Mix Calculator</h1>
        <a href="../../../index.html" class="text-sm md:text-base px-4 py-2 rounded-full bg-cyan-700 text-white hover:bg-cyan-800 transition">Back to Home</a>
      </div>
      <p class="text-gray-700 mb-8">Compute total spray solution, product requirement, and per-tank mix values for field operations.</p>

      <section class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <label class="block">
          <span class="text-sm font-semibold text-gray-700">Area</span>
          <div class="mt-1 flex gap-2">
            <input id="area" type="number" min="0" step="0.01" value="1" class="w-full border border-gray-300 rounded-xl px-3 py-2">
            <select id="areaUnit" class="border border-gray-300 rounded-xl px-3 py-2">
              <option value="acre">Acre</option>
              <option value="ha">Hectare</option>
            </select>
          </div>
        </label>
        <label class="block">
          <span class="text-sm font-semibold text-gray-700">Spray Volume (L per acre)</span>
          <input id="sprayVolume" type="number" min="1" step="1" value="200" class="mt-1 w-full border border-gray-300 rounded-xl px-3 py-2">
        </label>
        <label class="block">
          <span class="text-sm font-semibold text-gray-700">Dose</span>
          <div class="mt-1 flex gap-2">
            <input id="dose" type="number" min="0.1" step="0.1" value="2" class="w-full border border-gray-300 rounded-xl px-3 py-2">
            <select id="doseUnit" class="border border-gray-300 rounded-xl px-3 py-2">
              <option value="mlPerL">ml per liter</option>
              <option value="gPerL">g per liter</option>
            </select>
          </div>
        </label>
        <label class="block">
          <span class="text-sm font-semibold text-gray-700">Tank Capacity (L)</span>
          <input id="tankCapacity" type="number" min="1" step="1" value="15" class="mt-1 w-full border border-gray-300 rounded-xl px-3 py-2">
        </label>
      </section>

      <button id="calculateBtn" class="mt-6 w-full md:w-auto px-6 py-3 bg-cyan-700 text-white rounded-xl font-semibold hover:bg-cyan-800 transition">Calculate Spray Mix</button>

      <section id="result" class="mt-8 hidden rounded-2xl border border-cyan-100 bg-cyan-50 p-5">
        <h2 class="text-xl font-bold text-cyan-800 mb-3">Results</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-gray-800">
          <p id="solutionNeed"></p>
          <p id="productNeed"></p>
          <p id="tankPlan"></p>
          <p id="perTankDose"></p>
        </div>
      </section>

      <section class="mt-8 border-t pt-6">
        <h3 class="text-lg font-bold text-gray-900">Safety note</h3>
        <p class="text-gray-700 mt-2">Always follow label instructions, PPE requirements, and local extension advisory. This calculator is a planning aid only.</p>
      </section>
    </div>
  </main>
  <script src="./pesticide-spray-mix-calculator.js"></script>
</body>
</html>
